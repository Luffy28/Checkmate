services:
  - type: web
    name: checkmate-server
    runtime: node
    buildCommand: "cd server && npm install && npm run build"
    startCommand: "cd server && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_HOST
        value: https://your-render-app-name.onrender.com
      - key: DB_CONNECTION_STRING
        fromSecret: mongodb-connection-string
      - key: JWT_SECRET
        generateValue: true
      - key: LOG_LEVEL
        value: info
      - key: ORIGIN
        value: https://your-render-app-name.onrender.com
    healthCheckPath: /api/v1/health

  - type: web
    name: checkmate-client
    runtime: node
    buildCommand: "cd client && npm install && npm run build"
    startCommand: "cd client && npm run preview"
    envVars:
      - key: VITE_APP_API_BASE_URL
        value: https://checkmate-server.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html